name: pharmadesk
description: Offline Medical Store Management Application (Windows + Mobile)
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Database (Offline) + Windows/Linux/macOS support
  sqflite: ^2.3.0
  sqflite_common_ffi: ^2.3.2
  path: ^1.9.0

  # State Management
  provider: ^6.1.2

  # UI & Utilities
  intl: ^0.19.0

  # PDF / Invoice Printing
  pdf: ^3.10.7
  printing: ^5.11.0


dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

  # App Icon Generator
  flutter_launcher_icons: ^0.13.1


# ✅ LAUNCHER ICON CONFIG (FINAL & CORRECT)
flutter_launcher_icons:
  android: true
  ios: false
  windows:
    generate: true
    image_path: "assets/icon.png"
  image_path: "assets/icon.png"


flutter:
  uses-material-design: true
